# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

after-startup-command = []
start-at-login = true

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0
default-root-container-layout = 'accordion'
default-root-container-orientation = 'vertical'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse window-lazy-center"

automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     0
outer.top =        0
outer.right =      0

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion vertical'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Workspace switching (event-trigger SketchyBar) ---
alt-1 = ['workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-2 = ['workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-3 = ['workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-4 = ['workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-5 = ['workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-8 = ['workspace 8', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-9 = ['workspace 9', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

alt-e = ['workspace E', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-m = ['workspace M', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-n = ['workspace N', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-o = ['workspace O', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-p = ['workspace P', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-q = ['workspace Q', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-w = ['workspace W', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

# Move node to workspace (optional: also trigger, so the indicator updates if it changes focus)
alt-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-5 = ['move-node-to-workspace 5', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-8 = ['move-node-to-workspace 8', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-9 = ['move-node-to-workspace 9', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

alt-shift-e = ['move-node-to-workspace E', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-m = ['move-node-to-workspace M', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-n = ['move-node-to-workspace N', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-o = ['move-node-to-workspace O', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-p = ['move-node-to-workspace P', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-q = ['move-node-to-workspace Q', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
alt-shift-w = ['move-node-to-workspace W', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']

# Back and forth
alt-tab = ['workspace-back-and-forth', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
